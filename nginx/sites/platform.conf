# Platform UX - hiring.signalguard.test, admin.signalguard.test, ide.signalguard.test, auth.signalguard.test
server {
    listen 80;
    server_name hiring.signalguard.test admin.signalguard.test ide.signalguard.test auth.signalguard.test;

    # General Rate Limiting
    limit_req zone=general burst=50 nodelay;

    # Static Assets Caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://platform_ux;
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, immutable";
        expires 1h;
    }

    # Main Application
    location / {
        proxy_pass http://platform_ux;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # SPA Fallback
        try_files $uri $uri/ /index.html;
    }

    # WebSocket Support for IDE
    location /ws {
        proxy_pass http://platform_ux;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
