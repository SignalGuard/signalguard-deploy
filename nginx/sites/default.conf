# -------------------------------------------------------------------
# Backend API (.local and .dev)
# -------------------------------------------------------------------
server {
    listen 80;
    server_name api.signalguard.local api.signalguard.dev;

    # In production, 80 should redirect to 443
    # if ($host = api.signalguard.dev) {
    #     return 301 https://$host$request_uri;
    # }

    location / {
        proxy_pass http://backend-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# -------------------------------------------------------------------
# Platform UX (Hiring, Admin, IDE, Replay, Auth)
# -------------------------------------------------------------------
server {
    listen 80;
    server_name 
        hiring.signalguard.local hiring.signalguard.dev
        admin.signalguard.local admin.signalguard.dev
        ide.signalguard.local ide.signalguard.dev
        replay.signalguard.local replay.signalguard.dev
        auth.signalguard.local auth.signalguard.dev;

    # In production, 80 should redirect to 443
    # if ($host ~* \.dev$) {
    #     return 301 https://$host$request_uri;
    # }

    location / {
        proxy_pass http://platform-ux:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (important for IDE and Replay potentially)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# -------------------------------------------------------------------
# Marketing Web (.local and .dev)
# -------------------------------------------------------------------
server {
    listen 80;
    server_name signalguard.local signalguard.dev;

    # In production, 80 should redirect to 443
    # if ($host = signalguard.dev) {
    #     return 301 https://$host$request_uri;
    # }

    location / {
        proxy_pass http://marketing-web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
