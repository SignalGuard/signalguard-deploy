version: '3.8'

services:
  edge-nginx:
    image: nginx:alpine
    container_name: sg-edge-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - sg-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      - backend-api
      - platform-ux
      - marketing-web

  marketing-web:
    image: ghcr.io/signalguard/marketing-web:latest
    container_name: sg-marketing-web
    networks:
      - sg-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  platform-ux:
    image: ghcr.io/signalguard/platform-ux:latest
    container_name: sg-platform-ux
    environment:
      - VITE_API_BASE_URL=https://api.signalguard.dev/api/v1
      - VITE_PLATFORM_URL=https://hiring.signalguard.dev
      - VITE_ADMIN_URL=https://admin.signalguard.dev
      - VITE_IDE_URL=https://ide.signalguard.dev
      - VITE_AUTH_URL=https://auth.signalguard.dev
    networks:
      - sg-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  postgres:
    image: postgres:15-alpine
    container_name: sg-postgres
    command: [ "postgres", "-c", "shared_buffers=256MB", "-c", "effective_cache_size=768MB", "-c", "work_mem=8MB", "-c", "maintenance_work_mem=64MB", "-c", "min_wal_size=1GB", "-c", "max_wal_size=4GB", "-c", "checkpoint_completion_target=0.9", "-c", "wal_buffers=16MB", "-c", "default_statistics_target=100", "-c", "random_page_cost=1.1", "-c", "effective_io_concurrency=200", "-c", "max_connections=100" ]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-signalguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-signalguard}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - sg-network
    # Not exposing 5432 publicly in production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U signalguard" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.2.4-alpine
    container_name: sg-redis
    command: [ "redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--save", "900", "1", "300", "10", "60", "100" ]
    volumes:
      - redisdata:/data
    networks:
      - sg-network
    # Not exposing 6379 publicly in production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  backend-api:
    image: ghcr.io/signalguard/backend-api:latest
    container_name: sg-backend-api
    command: [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000" ]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-signalguard}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-signalguard}
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_MODE=${STORAGE_MODE:-FILESYSTEM}
      - BASE_STORAGE_PATH=/data/storage
      - USE_LOCAL_SANDBOX=true
      - ASSESSMENTS_ROOT=/assessments/assessments
      - ASSESSMENTS_REPO=/assessments
      - HEALTH_PORT=9100
      - SERVICE_TYPE=api
      - GEMINI_KEY=${GEMINI_KEY}
    volumes:
      - sg-storage:/data/storage
      - ${DOCKER_HOST_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sg-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  worker:
    image: ghcr.io/signalguard/worker:latest
    container_name: sg-worker
    command: [ "dramatiq", "app.worker.tasks", "--processes", "1", "--threads", "4" ]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-signalguard}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-signalguard}
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_MODE=${STORAGE_MODE:-FILESYSTEM}
      - BASE_STORAGE_PATH=/data/storage
      - USE_LOCAL_SANDBOX=true
      - ASSESSMENTS_ROOT=/assessments/assessments
      - ASSESSMENTS_REPO=/assessments
      - HEALTH_PORT=9100
      - SERVICE_TYPE=worker
    volumes:
      - sg-storage:/data/storage
      - ${DOCKER_HOST_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
    depends_on:
      - postgres
      - redis
    networks:
      - sg-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  runner:
    image: ghcr.io/signalguard/runner:latest
    container_name: sg-runner
    environment:
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_MODE=${STORAGE_MODE:-FILESYSTEM}
      - BASE_STORAGE_PATH=/data/storage
      - HEALTH_PORT=9100
      - SERVICE_TYPE=runner
    volumes:
      - sg-storage:/data/storage
      - ${DOCKER_HOST_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
    depends_on:
      - postgres
      - redis
    networks:
      - sg-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  sandbox:
    image: ghcr.io/signalguard/sandbox:latest
    container_name: sg-sandbox
    environment:
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_MODE=${STORAGE_MODE:-FILESYSTEM}
      - BASE_STORAGE_PATH=/data/storage
      - HEALTH_PORT=9100
      - SERVICE_TYPE=sandbox
    volumes:
      - sg-storage:/data/storage
      - ${DOCKER_HOST_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
    networks:
      - sg-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

networks:
  sg-network:
    name: sg-network
    driver: bridge

volumes:
  pgdata:
  redisdata:
  sg-storage:
