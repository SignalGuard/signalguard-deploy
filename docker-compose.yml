version: '3.8'

services:
  edge-nginx:
    image: nginx:alpine
    container_name: sg-edge-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - sg-network
    depends_on:
      - backend-api
      - platform-ux
      - marketing-web

  marketing-web:
    build:
      context: ../signalguard-web
      dockerfile: Dockerfile
    container_name: sg-marketing-web
    networks:
      - sg-network
    # Exposed internally to the network for edge-nginx to proxy

  platform-ux:
    build:
      context: ../signalguard-ux
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://api.signalguard.test/api/v1
        - VITE_PLATFORM_URL=http://hiring.signalguard.test
        - VITE_ADMIN_URL=http://admin.signalguard.test
        - VITE_IDE_URL=http://ide.signalguard.test
        - VITE_AUTH_URL=http://auth.signalguard.test
    container_name: sg-platform-ux
    networks:
      - sg-network
    # Exposed internally to the network for edge-nginx to proxy

  postgres:
    image: postgres:15-alpine
    container_name: sg-postgres
    command: [ "postgres", "-c", "shared_buffers=256MB", "-c", "effective_cache_size=768MB", "-c", "work_mem=8MB", "-c", "maintenance_work_mem=64MB", "-c", "min_wal_size=1GB", "-c", "max_wal_size=4GB", "-c", "checkpoint_completion_target=0.9", "-c", "wal_buffers=16MB", "-c", "default_statistics_target=100", "-c", "random_page_cost=1.1", "-c", "effective_io_concurrency=200", "-c", "max_connections=100" ]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-signalguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-signalguard}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - sg-network
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U signalguard" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.2.4-alpine
    container_name: sg-redis
    command: [ "redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--save", "900", "1", "300", "10", "60", "100" ]
    volumes:
      - redisdata:/data
    networks:
      - sg-network
    ports:
      - "6379:6379"

  backend-api:
    build:
      context: ../signalguard-backend
      dockerfile: Dockerfile.api
    container_name: sg-backend-api
    command: [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload" ]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-signalguard}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-signalguard}
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_MODE=${STORAGE_MODE:-FILESYSTEM}
      - BASE_STORAGE_PATH=/data/storage
      - USE_LOCAL_SANDBOX=true
      - ASSESSMENTS_ROOT=/assessments/assessments
      - ASSESSMENTS_REPO=/assessments
      - HEALTH_PORT=9100
      - SERVICE_TYPE=api
      - GEMINI_KEY=${GEMINI_KEY}
    volumes:
      - sg-storage:/data/storage
      - ${DOCKER_HOST_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
      - ../signalguard-assessments:/assessments:ro
      - ../signalguard-backend/app:/app/app
      - ../signalguard-backend/database_schema:/app/database_schema
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sg-network
    # Exposed internally to the network for edge-nginx to proxy

  worker:
    build:
      context: ../signalguard-backend
      dockerfile: Dockerfile.worker
    container_name: sg-worker
    command: [ "dramatiq", "app.worker.tasks", "--processes", "1", "--threads", "4" ]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-signalguard}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-signalguard}
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_MODE=${STORAGE_MODE:-FILESYSTEM}
      - BASE_STORAGE_PATH=/data/storage
      - USE_LOCAL_SANDBOX=true
      - ASSESSMENTS_ROOT=/assessments/assessments
      - ASSESSMENTS_REPO=/assessments
      - HEALTH_PORT=9100
      - SERVICE_TYPE=worker
    volumes:
      - sg-storage:/data/storage
      - ${DOCKER_HOST_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
      - ../signalguard-assessments:/assessments:ro
      - ../signalguard-backend/app:/app/app
      - ../signalguard-backend/database_schema:/app/database_schema
    depends_on:
      - postgres
      - redis
    networks:
      - sg-network

  runner:
    build:
      context: ../signalguard-backend
      dockerfile: Dockerfile.runner
    container_name: sg-runner
    environment:
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_MODE=${STORAGE_MODE:-FILESYSTEM}
      - BASE_STORAGE_PATH=/data/storage
      - HEALTH_PORT=9100
      - SERVICE_TYPE=runner
    volumes:
      - sg-storage:/data/storage
      - ${DOCKER_HOST_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
      - ../signalguard-assessments:/assessments:ro
      - ../signalguard-backend/app:/app/app
    depends_on:
      - postgres
      - redis
    networks:
      - sg-network

  sandbox:
    build:
      context: ../signalguard-backend
      dockerfile: Dockerfile.sandbox
    container_name: sg-sandbox
    environment:
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_MODE=${STORAGE_MODE:-FILESYSTEM}
      - BASE_STORAGE_PATH=/data/storage
      - HEALTH_PORT=9100
      - SERVICE_TYPE=sandbox
    volumes:
      - sg-storage:/data/storage
      - ${DOCKER_HOST_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
      - ../signalguard-assessments:/assessments:ro
      - ../signalguard-backend/app:/app/app
    networks:
      - sg-network

networks:
  sg-network:
    name: sg-network
    driver: bridge

volumes:
  pgdata:
  redisdata:
  sg-storage:
